<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Multi-agent waste demo</title>
  <desc id="desc">A costed fixture shows an actual multi-agent trace cost of 0.084 dollars, an estimated single-agent baseline of 0.042 dollars, and estimated orchestration overhead of 0.042 dollars.</desc>
  <rect width="960" height="440" rx="30" fill="#0f172a"/>
  <rect x="28" y="28" width="904" height="384" rx="26" fill="#111827" stroke="#334155"/>

  <text x="62" y="78" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700">Multi-agent waste demo</text>
  <text x="62" y="110" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Fixture-backed configurable single-agent baseline estimate</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="62" y="164" fill="#e2e8f0" font-size="16">Actual multi-agent trace</text>
    <rect x="310" y="146" width="460" height="30" rx="15" fill="#1e293b"/>
    <rect x="310" y="146" width="460" height="30" rx="15" fill="#38bdf8"/>
    <text x="842" y="168" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="end">$0.084000000</text>

    <text x="62" y="222" fill="#e2e8f0" font-size="16">Estimated single-agent baseline</text>
    <rect x="310" y="204" width="460" height="30" rx="15" fill="#1e293b"/>
    <rect x="310" y="204" width="230" height="30" rx="15" fill="#22c55e"/>
    <text x="842" y="226" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="end">$0.042000000</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="62" y="282" width="246" height="84" rx="18" fill="#0b1220" stroke="#334155"/>
    <text x="88" y="314" fill="#94a3b8" font-size="13">Estimated overhead</text>
    <text x="88" y="345" fill="#f8fafc" font-size="24" font-weight="700">$0.042000000</text>

    <rect x="356" y="282" width="210" height="84" rx="18" fill="#0b1220" stroke="#334155"/>
    <text x="382" y="314" fill="#94a3b8" font-size="13">Cost multiple</text>
    <text x="382" y="345" fill="#f8fafc" font-size="24" font-weight="700">2.00x</text>

    <rect x="614" y="282" width="246" height="84" rx="18" fill="#0b1220" stroke="#334155"/>
    <text x="640" y="314" fill="#94a3b8" font-size="13">Agents detected</text>
    <text x="640" y="345" fill="#f8fafc" font-size="24" font-weight="700">3</text>
  </g>

  <text x="62" y="394" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">Basis: configurable estimate. Validate important workflows with observed project-specific single-agent baselines.</text>
</svg>
