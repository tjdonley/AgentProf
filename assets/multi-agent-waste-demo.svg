<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Multi-agent waste estimate</title>
  <desc id="desc">A fixture trace with three agents costs 0.084 dollars. A configured 0.50 single-agent baseline estimates 0.042 dollars of orchestration overhead and a 2.00x cost multiple.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f2e8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L9 4.5L0 9Z" fill="#9c9284"/>
    </marker>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #232a33; font-size: 31px; font-weight: 760; }
      .sub { fill: #66717f; font-size: 15px; }
      .label { fill: #232a33; font-size: 15px; font-weight: 760; }
      .muted { fill: #66717f; font-size: 12px; }
      .metric { fill: #232a33; font-size: 28px; font-weight: 800; }
      .money { fill: #232a33; font-size: 18px; font-weight: 800; }
    </style>
  </defs>

  <rect width="980" height="520" rx="32" fill="#fbfaf7"/>
  <rect x="30" y="28" width="920" height="464" rx="30" fill="url(#panel)" stroke="#d8d2c8"/>

  <g class="font">
    <text x="70" y="82" class="title">Multi-agent cost, separated from the baseline</text>
    <text x="70" y="112" class="sub">The demo fixture estimates the orchestration overhead of a three-agent trace using a 0.50 baseline ratio.</text>

    <g transform="translate(70 156)">
      <rect width="274" height="230" rx="22" fill="#ffffff" stroke="#d8d2c8"/>
      <text x="24" y="38" class="label">Trace shape</text>
      <text x="24" y="62" class="muted">3 distinct agent actors</text>

      <g transform="translate(28 94)">
        <circle cx="32" cy="26" r="25" fill="#dff4f1" stroke="#2db7ad" stroke-width="3"/>
        <circle cx="109" cy="26" r="25" fill="#fff2c2" stroke="#f8bd3b" stroke-width="3"/>
        <circle cx="186" cy="26" r="25" fill="#f6dfd8" stroke="#f26f5b" stroke-width="3"/>
        <path d="M57 26H82" fill="none" stroke="#9c9284" stroke-width="4" marker-end="url(#arrow)"/>
        <path d="M134 26H159" fill="none" stroke="#9c9284" stroke-width="4" marker-end="url(#arrow)"/>
        <text x="32" y="71" fill="#232a33" font-size="11" font-weight="700" text-anchor="middle">root</text>
        <text x="109" y="71" fill="#232a33" font-size="11" font-weight="700" text-anchor="middle">tool</text>
        <text x="186" y="71" fill="#232a33" font-size="11" font-weight="700" text-anchor="middle">agent</text>
      </g>

      <rect x="24" y="178" width="226" height="30" rx="15" fill="#232a33"/>
      <text x="137" y="198" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="760">handoffs create measurable overhead</text>
    </g>

    <g transform="translate(388 156)">
      <rect width="522" height="230" rx="22" fill="#ffffff" stroke="#d8d2c8"/>
      <text x="26" y="38" class="label">Cost attribution</text>
      <text x="26" y="62" class="muted">actual trace = estimated baseline + estimated overhead</text>

      <text x="26" y="103" class="label">Actual multi-agent trace</text>
      <text x="472" y="103" class="money" text-anchor="end">$0.084000000</text>
      <rect x="26" y="120" width="446" height="36" rx="18" fill="#f1ede4"/>
      <rect x="26" y="120" width="223" height="36" rx="18" fill="#2db7ad"/>
      <path d="M231 120H249V156H231Z" fill="#2db7ad"/>
      <rect x="249" y="120" width="223" height="36" rx="18" fill="#f8bd3b"/>
      <path d="M249 120H267V156H249Z" fill="#f8bd3b"/>
      <text x="138" y="144" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle">baseline</text>
      <text x="360" y="144" fill="#232a33" font-size="13" font-weight="800" text-anchor="middle">overhead</text>

      <g transform="translate(26 176)">
        <rect width="136" height="36" rx="18" fill="#dff4f1"/>
        <text x="68" y="23" fill="#232a33" font-size="13" font-weight="800" text-anchor="middle">$0.042 baseline</text>
        <rect x="154" width="144" height="36" rx="18" fill="#fff2c2"/>
        <text x="226" y="23" fill="#232a33" font-size="13" font-weight="800" text-anchor="middle">$0.042 overhead</text>
        <rect x="316" width="118" height="36" rx="18" fill="#232a33"/>
        <text x="375" y="23" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle">2.00x cost</text>
      </g>
    </g>

    <g transform="translate(70 420)">
      <rect width="240" height="54" rx="18" fill="#ffffff" stroke="#d8d2c8"/>
      <text x="22" y="19" class="muted">Estimated overhead</text>
      <text x="22" y="42" class="metric">$0.042</text>

      <rect x="270" width="190" height="54" rx="18" fill="#ffffff" stroke="#d8d2c8"/>
      <text x="292" y="19" class="muted">Cost multiple</text>
      <text x="292" y="42" class="metric">2.00x</text>

      <rect x="490" width="190" height="54" rx="18" fill="#ffffff" stroke="#d8d2c8"/>
      <text x="512" y="19" class="muted">Agents detected</text>
      <text x="512" y="42" class="metric">3</text>

      <rect x="710" width="200" height="54" rx="18" fill="#232a33"/>
      <text x="732" y="23" fill="#cfd7df" font-size="12">Basis</text>
      <text x="732" y="38" fill="#ffffff" font-size="14" font-weight="760">configured estimate</text>
    </g>
  </g>
</svg>
