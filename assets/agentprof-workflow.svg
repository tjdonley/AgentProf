<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">AgentProf workflow</title>
  <desc id="desc">Langfuse exports flow through local privacy processing, DuckDB storage, deterministic analyzers, cost attribution, and report generation.</desc>
  <rect width="1180" height="560" rx="34" fill="#fbfaf7"/>
  <rect x="34" y="34" width="1112" height="492" rx="28" fill="#ffffff" stroke="#d8d2c8"/>

  <text x="70" y="92" fill="#232a33" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">Local trace profiling workflow</text>
  <text x="70" y="126" fill="#5f6874" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Import exports, keep the data local, and turn spans into evidence-backed waste reports.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g transform="translate(70 186)">
      <rect width="168" height="142" rx="22" fill="#f8fafc" stroke="#cbd5e1"/>
      <circle cx="44" cy="42" r="18" fill="#38bdf8"/>
      <path d="M34 42 H54 M44 32 V52" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
      <text x="24" y="84" fill="#0f172a" font-size="19" font-weight="700">Import</text>
      <text x="24" y="112" fill="#475569" font-size="13">Langfuse JSON</text>
      <text x="24" y="132" fill="#475569" font-size="13">or CSV exports</text>
    </g>

    <path d="M252 257 H318" stroke="#9aa4b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M309 246 L320 257 L309 268" fill="none" stroke="#9aa4b2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(332 186)">
      <rect width="168" height="142" rx="22" fill="#effdf8" stroke="#99f6e4"/>
      <path d="M42 27 C58 27 70 39 70 55 C70 75 54 88 42 98 C30 88 14 75 14 55 C14 39 26 27 42 27 Z" fill="#2dd4bf"/>
      <path d="M35 57 L41 64 L54 47" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="24" y="84" fill="#0f172a" font-size="19" font-weight="700">Sanitize</text>
      <text x="24" y="112" fill="#475569" font-size="13">Redact secrets</text>
      <text x="24" y="132" fill="#475569" font-size="13">and hash I/O</text>
    </g>

    <path d="M514 257 H580" stroke="#9aa4b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M571 246 L582 257 L571 268" fill="none" stroke="#9aa4b2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(594 186)">
      <rect width="168" height="142" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
      <ellipse cx="48" cy="37" rx="28" ry="13" fill="#f59e0b" stroke="#92400e" stroke-width="3"/>
      <path d="M20 37 V76 C20 84 32 91 48 91 C64 91 76 84 76 76 V37" fill="#fbbf24" stroke="#92400e" stroke-width="3"/>
      <path d="M20 56 C20 64 32 71 48 71 C64 71 76 64 76 56" fill="none" stroke="#92400e" stroke-width="3"/>
      <text x="24" y="112" fill="#0f172a" font-size="19" font-weight="700">Normalize</text>
      <text x="24" y="132" fill="#475569" font-size="13">Canonical spans</text>
    </g>

    <path d="M776 257 H842" stroke="#9aa4b2" stroke-width="4" stroke-linecap="round"/>
    <path d="M833 246 L844 257 L833 268" fill="none" stroke="#9aa4b2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(856 186)">
      <rect width="210" height="142" rx="22" fill="#f5f3ff" stroke="#ddd6fe"/>
      <circle cx="44" cy="42" r="17" fill="#8b5cf6"/>
      <circle cx="85" cy="42" r="17" fill="#a78bfa"/>
      <circle cx="126" cy="42" r="17" fill="#c4b5fd"/>
      <path d="M61 42 H68 M102 42 H109" stroke="#312e81" stroke-width="4" stroke-linecap="round"/>
      <text x="24" y="84" fill="#0f172a" font-size="19" font-weight="700">Analyze</text>
      <text x="24" y="112" fill="#475569" font-size="13">Retries, specs,</text>
      <text x="24" y="132" fill="#475569" font-size="13">multi-agent waste</text>
    </g>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="190" y="398" width="800" height="72" rx="22" fill="#0f172a"/>
    <text x="226" y="428" fill="#cbd5e1" font-size="14">Output artifacts</text>
    <text x="226" y="454" fill="#f8fafc" font-size="21" font-weight="700">Markdown report</text>
    <text x="486" y="454" fill="#f8fafc" font-size="21" font-weight="700">JSON evidence</text>
    <text x="724" y="454" fill="#f8fafc" font-size="21" font-weight="700">Cost visuals</text>
    <circle cx="454" cy="446" r="5" fill="#38bdf8"/>
    <circle cx="690" cy="446" r="5" fill="#38bdf8"/>
  </g>
</svg>
